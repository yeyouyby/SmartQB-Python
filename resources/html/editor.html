<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Cherry Markdown Editor</title>
    <!-- Use local files for offline availability -->
    <link rel="stylesheet" href="cherry_markdown/cherry-markdown.min.css">
</head>
<body style="margin: 0; padding: 0;">
    <div id="cherry-markdown" style="width: 100vw; height: 100vh;"></div>

    <script src="cherry_markdown/cherry-markdown.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        var cherryEditor = new Cherry({
            id: 'cherry-markdown',
            value: '# 欢迎来到 SmartQB-QT 终极重构版\n\n测试公式 $E = mc^2$',
            toolbars: {
                theme: 'light',
                showToolbar: true
            },
            editor: {
                defaultModel: 'edit&preview'
            }
        });

        // Initialize dummy functions so early calls don't raise undefined errors
        window.getMarkdown = function() { return cherryEditor.getMarkdown(); };
        window.setMarkdown = function(content) { cherryEditor.setMarkdown(content); };

        // Setup QWebChannel for Python <-> JS communication
        new QWebChannel(qt.webChannelTransport, function(channel) {
            window.backend = channel.objects.backend;

            // Expose a method for Python to get markdown content, now bound with backend
            window.getMarkdown = function() {
                var content = cherryEditor.getMarkdown();
                backend.receive_markdown(content);
                return content;
            };

            // Expose a method for Python to set markdown content
            window.setMarkdown = function(content) {
                cherryEditor.setMarkdown(content);
            };
        });
    </script>
</body>
</html>
