<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question View</title>
    <link rel="stylesheet" href="../assets/base.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="../assets/mathjax/es5/tex-mml-svg.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        let pyBridge = null;
        new QWebChannel(qt.webChannelTransport, function (channel) {
            pyBridge = channel.objects.pyBridge;
        });

        window.updateContent = function(html, capture) {
            const container = document.getElementById('math-content');
            if (!container) return;
            container.innerHTML = html;
            if (typeof MathJax !== 'undefined') {
                MathJax.typesetPromise([container]).then(() => {
                    if (capture && pyBridge) pyBridge.snapshotReady();
                }).catch(err => {
                    console.error("MathJax error:", err);
                    if (capture && pyBridge) pyBridge.snapshotReady();
                });
            } else {
                if (capture && pyBridge) pyBridge.snapshotReady();
            }
        };

        document.addEventListener('dragstart', function(event) {
            if (event.target.tagName.toLowerCase() === 'img') {
                event.preventDefault();
                if (pyBridge) {
                    const tempId = event.target.dataset.uuid || '';
                    pyBridge.startDrag(tempId);
                }
            }
        });
    </script>
</head>
<body>
    <div id="math-content" class="math-content">
        <!-- Content gets injected here -->
    </div>
</body>
</html>
