name: Ultimate CI/CD & PR Orchestrator

# 监听四种事件：推送、PR变更、全局评论、单行评论
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ==========================================
  # [第一关] 代码质量检查 (Push 和 PR 时触发)
  # ==========================================
  mega-check:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: 🛡️ All-in-One Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.12.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.10'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit PySide6

      - name: 🎨 Check Formatting (Ruff)
        if: always() 
        run: ruff format --check .

      - name: 🐛 Lint Code (Ruff)
        if: always()
        run: ruff check --output-format=github .

      - name: 🏷️ Type Checking (Mypy)
        if: always()
        run: mypy . --ignore-missing-imports

      - name: 🔒 Security Scan (Bandit)
        if: always()
        run: bandit -r . -x ./.git,./__pycache__ -ll -i

  # ==========================================
  # [第二关] 物理清场（依赖第一关！检查通过才执行）
  # ==========================================
  fold-everything:
    needs: mega-check
    if: github.event_name == 'pull_request'
    name: 🧹 Fold Old Comments
    runs-on: ubuntu-latest
    steps:
      - name: Fold all existing comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const { owner, repo } = context.repo;
            
            console.log(`[步骤 2: 物理清场] 代码检查已通过，开始清理 PR #${prNumber} ...`);
            const { data: issueComments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({ owner, repo, pull_number: prNumber });

            const allNodeIds = [...issueComments.map(c => c.node_id), ...reviewComments.map(c => c.node_id)];
            if (allNodeIds.length === 0) return;

            const mutation = `
              mutation($subjectId: ID!) {
                minimizeComment(input: {classifier: RESOLVED, subjectId: $subjectId}) {
                  minimizedComment { isMinimized }
                }
              }
            `;
            
            let successCount = 0;
            for (const id of allNodeIds) {
              try { 
                await github.graphql(mutation, { subjectId: id }); 
                successCount++;
              } catch (e) {
                console.error(`折叠失败 [节点ID: ${id}]:`, e.message);
              }
            }
            console.log(`[清场完毕] 真实成功折叠了 ${successCount} 条旧评论！`);

  # ==========================================
  # [第三关] 召唤 AI（等清场完毕才入场）
  # ==========================================
  summon-ais:
    needs: fold-everything
    if: github.event_name == 'pull_request'
    name: 🤖 Summon AI Reviewers
    runs-on: ubuntu-latest
    steps:
      - name: Send commands to wake up AIs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const prNumber = context.issue.number || context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            
            const commands = ["/gemini review", "@sourcery-ai guide"];
            
            console.log(`[步骤 3: 召唤 AI] 战场清理完毕，在 PR #${prNumber} 中召唤 AI...`);
            for (const cmd of commands) {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: cmd });
            }

  # ==========================================
  # [第四关] 狙击手模式（带 Kimi K2 智能识别）
  # ==========================================
  ping-jules:
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
    name: 🎯 Smart Sniper @jules
    runs-on: ubuntu-latest
    steps:
      - name: Reply to AI and ping @jules
        uses: actions/github-script@v7
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        with:
          github-token: ${{ secrets.MY_PERSONAL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const commentBody = context.payload.comment.body;
            // 获取评论者的 ID 并全部转为小写，杜绝大小写绕过
            const commenter = context.payload.comment.user.login.toLowerCase();
            const nimApiKey = process.env.NVIDIA_API_KEY;
            
            // 【终极防线】：在代码层面进行严格的人员排查
            if (['yeyouyby', 'jules', 'github-actions[bot]'].includes(commenter)) {
              console.log(`[防御触发] 检测到评论者是: ${commenter}，属于白名单人员，放弃本次狙击。`);
              return;
            }
            
            // --- NIM Kimi K2 智能识别逻辑开始 ---
            if (nimApiKey) {
              console.log(`正在使用 NVIDIA NIM API (Kimi K2) 分析 ${commenter} 的评论内容...`);
              try {
                const response = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${nimApiKey}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    // 替换为你要求的 Moonshot Kimi K2 模型
                    model: "moonshotai/kimi-k2-instruct-0905",
                    messages: [
                      {
                        role: "system",
                        content: "你是一个极其精准的文本分类器。你需要判断以下的 GitHub PR 评论是否包含了实质性的代码审查意见（Code Review）、改进建议或开发指南。\n\n规则如下：\n1. 如果评论中包含具体的代码分析、修改建议、找出的 bug 或开发指导，请严格且仅回复 'YES'。\n2. 如果评论仅仅是收到指令的回应（例如'正在为您审阅'、'I will look into this'）、系统通知、或者空洞的确认，请严格且仅回复 'NO'。\n\n绝对不要回复任何除 'YES' 或 'NO' 以外的多余字符。"
                      },
                      { role: "user", content: commentBody }
                    ],
                    temperature: 0.1,
                    max_tokens: 10
                  })
                });
                
                // 【核心修复】：先校验网络状态码，防止 JSON.parse 崩溃
                if (!response.ok) {
                  const errorText = await response.text();
                  throw new Error(`API 异常报错! 状态码: ${response.status}, 详情: ${errorText}`);
                }
                
                const data = await response.json();
                const llmReply = data.choices[0].message.content.trim().toUpperCase();
                console.log(`Kimi K2 识别结果: ${llmReply}`);
                
                if (!llmReply.includes('YES')) {
                  console.log("拦截成功：AI 判定这是一条无意义的占位/通知评论，跳过 @jules。");
                  return;
                }
              } catch (err) {
                console.error("NVIDIA NIM API 调用失败，终止本次任务以免误发通知:", err.message);
                return; // 遇到 API 错误直接退出，绝不乱开枪
              }
            } else {
              console.log("未检测到 NVIDIA_API_KEY，跳过智能识别。");
            }
            // --- 智能识别逻辑结束 ---

            const replyBody = "@jules 代码质量检查已通过，请注意查看并处理这部分 AI 审查/指南意见 👆";
            
            if (eventName === 'issue_comment') {
              const issueNumber = context.payload.issue.number;
              await github.rest.issues.createComment({
                owner: owner, repo: repo, issue_number: issueNumber, body: replyBody
              });
              console.log(`[狙击成功] 已在 PR #${issueNumber} 的全局评论下 @jules`);
            } else if (eventName === 'pull_request_review_comment') {
              const pullNumber = context.payload.pull_request.number;
              const commentId = context.payload.comment.id;
              await github.rest.pulls.createReplyForReviewComment({
                owner: owner, repo: repo, pull_number: pullNumber, comment_id: commentId, body: replyBody
              });
              console.log(`[狙击成功] 已在代码行内评论下 @jules`);
            }
